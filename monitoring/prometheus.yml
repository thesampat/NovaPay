global:
  scrape_interval: 15s

scrape_configs:
  # 1. Prometheus Scraping Itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 2. OTEL Collector Metrics (Bridge to Microservices)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # 3. Microservices (Direct Scrape or via OTEL)
  - job_name: "novapay-apps"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "host.docker.internal:3000" # Gateway
          - "host.docker.internal:3001" # Wallet
          - "host.docker.internal:3002" # Transaction
          - "host.docker.internal:3003" # Ledger
